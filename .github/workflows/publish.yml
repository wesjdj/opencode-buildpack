name: publish buildpack

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck && shellcheck bin/detect bin/build bin/opencode-init.sh

  package:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        if: matrix.arch == 'arm64'

      - name: install pack
        run: |
          curl -fsSL "https://github.com/buildpacks/pack/releases/download/v0.35.1/pack-v0.35.1-linux.tgz" \
            | sudo tar -xz -C /usr/local/bin pack
          pack version
          pack config experimental true

      - name: login to ghcr
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >>"$GITHUB_OUTPUT"
          else
            echo "version=$(sed -n 's/^ *version *= *"\(.*\)"/\1/p' buildpack.toml | head -n1)-${GITHUB_SHA::7}" >>"$GITHUB_OUTPUT"
          fi

      - name: package buildpack (${{ matrix.arch }})
        run: |
          pack buildpack package \
            "ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/renku-opencode-buildpack:${{ steps.ver.outputs.version }}-${{ matrix.arch }}" \
            --config package.toml \
            --target "linux/${{ matrix.arch }}" \
            --publish
        if: github.event_name != 'pull_request'

      - name: package buildpack (dry-run for PR)
        if: github.event_name == 'pull_request'
        run: |
          pack buildpack package \
            "renku-opencode-buildpack:pr-${{ github.event.pull_request.number }}-${{ matrix.arch }}" \
            --config package.toml \
            --target "linux/${{ matrix.arch }}" \
            --format image

  manifest:
    needs: package
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >>"$GITHUB_OUTPUT"
          else
            echo "version=$(sed -n 's/^ *version *= *"\(.*\)"/\1/p' buildpack.toml | head -n1)-${GITHUB_SHA::7}" >>"$GITHUB_OUTPUT"
          fi
      - name: create multi-arch manifest
        env:
          V: ${{ steps.ver.outputs.version }}
          OWNER: ${{ github.repository_owner }}
        run: |
          OWNER_LC="${OWNER,,}"
          docker buildx imagetools create \
            -t "ghcr.io/${OWNER_LC}/renku-opencode-buildpack:${V}" \
            "ghcr.io/${OWNER_LC}/renku-opencode-buildpack:${V}-amd64" \
            "ghcr.io/${OWNER_LC}/renku-opencode-buildpack:${V}-arm64"
