# Sample Renku project that produces a session image with JupyterLab + opencode.
#
# The SDSC "selector" builder provides jupyterlab (and all the other renku
# frontend buildpacks). We extend its buildpack group with this repo's
# renku/opencode buildpack. The BP_RENKU_FRONTENDS env var drives which
# frontends are installed.
#
# Build:
#   pack build my-registry/my-session:latest \
#     --builder ghcr.io/swissdatasciencecenter/renku-frontend-buildpacks/selector:0.4.0 \
#     --buildpack ghcr.io/YOUR-USER/renku-opencode-buildpack:0.1.0 \
#     --env BP_RENKU_FRONTENDS=jupyterlab,opencode \
#     --path .

[_]
schema-version = "0.2"

[io.buildpacks]
builder = "ghcr.io/swissdatasciencecenter/renku-frontend-buildpacks/selector:0.4.0"

  [[io.buildpacks.group]]
  uri = "docker://ghcr.io/YOUR-USER/renku-opencode-buildpack:0.1.0"

[[io.buildpacks.build.env]]
name = "BP_RENKU_FRONTENDS"
value = "jupyterlab,opencode"

# Pin an opencode release. Omit to track latest at build time.
# [[io.buildpacks.build.env]]
# name = "BP_OPENCODE_VERSION"
# value = "v1.4.6"
